services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: envelope_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: envelope_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U envelope_user -d envelope_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    init: true
    security_opt:
      - apparmor:unconfined
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PUBLIC_URL=${PUBLIC_URL:-}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - default
      - envelope_bridge

volumes:
  postgres_data:

networks:
  default:
  envelope_bridge:
    external: true
